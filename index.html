  <style>
    :root {
      --bg: #06070a;
      --bg-soft: #0d0f16;
      --card: rgba(255, 255, 255, 0.06);
      --card-border: rgba(255, 255, 255, 0.12);
      --text: #f6f3ec;
      --muted: #a9a6a0;
      --gold: #d6b25e;
      --gold-soft: rgba(214, 178, 94, 0.18);
      --orange: #ff7a1a;
      --green: #64d39b;
      --white-soft: rgba(255, 255, 255, 0.76);
      --shadow: 0 24px 80px rgba(0, 0, 0, 0.45);
      --radius: 28px;
      --max: 1180px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at 20% 0%, rgba(214, 178, 94, 0.14), transparent 32%),
        radial-gradient(circle at 80% 10%, rgba(255, 122, 26, 0.10), transparent 34%),
        var(--bg);
      color: var(--text);
      line-height: 1.6;
      overflow-x: hidden;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    img {
      max-width: 100%;
      display: block;
    }

    .container {
      width: min(var(--max), calc(100% - 40px));
      margin: 0 auto;
    }

    .noise {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 999;
      opacity: 0.035;
      background-image:

        linear-gradient(90deg, rgba(255,255,255,.6) 1px, transparent 1px);
      background-size: 24px 24px;
    }

    .cursor-glow {
      position: fixed;
      width: 360px;
      height: 360px;
      background: radial-gradient(circle, rgba(214,178,94,.18), transparent 64%);
      border-radius: 50%;
      pointer-events: none;
      transform: translate(-50%, -50%);
      z-index: 0;
      transition: opacity .25s ease;
    }

    header {
      position: fixed;
      top: 18px;
      left: 0;
      right: 0;
      z-index: 100;
    }

    .nav {
      width: min(var(--max), calc(100% - 40px));
      margin: 0 auto;
      padding: 13px 16px;
      border: 1px solid var(--card-border);
      background: rgba(6, 7, 10, 0.76);
      backdrop-filter: blur(20px);
      border-radius: 999px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: var(--shadow);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      font-weight: 800;
      letter-spacing: -0.03em;
    }

    .brand-mark {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      background: linear-gradient(135deg, var(--gold), var(--orange));
      color: #0b0b0d;
      font-weight: 900;
      box-shadow: 0 12px 32px rgba(214, 178, 94, 0.28);
    }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 24px;
      color: var(--muted);
      font-size: 14px;
    }

    .nav-links a {
      transition: .25s ease;
    }

    .nav-links a:hover {
      color: var(--text);
    }

    .nav-cta {
      padding: 11px 16px;
      border-radius: 999px;
      background: var(--text);
      color: #08090d;
      font-weight: 700;
      font-size: 14px;
      transition: .25s ease;

    .nav-cta:hover {
      transform: translateY(-2px);

    .mobile-toggle {
      display: none;
      background: transparent;
      color: var(--text);
      border: 0;
      font-size: 24px;
      cursor: pointer;
    }

    .hero {
      min-height: 100vh;
      display: grid;
      align-items: center;
      padding: 150px 0 80px;
      position: relative;

    .hero-grid {

    }

      height: 8px;
      border-radius: 50%;

      border-radius: 999px;
      padding: 14px 20px;
      border: 1px solid var(--card-border);

      transition: .25s ease;

    }

      display: grid;

      gap: 12px;

    }

      border-radius: 22px;
      background: rgba(255,255,255,.045);

      display: block;
      font-size: 24px;
      letter-spacing: -0.04em;
    }

      color: var(--muted);
      font-size: 13px;
    }

      height: 260px;

      color: #07080a;

      font-weight: 950;
      letter-spacing: -0.08em;

      display: grid;
      gap: 12px;
      position: relative;
      z-index: 1;
    }

    .mini-card {
      border: 1px solid var(--card-border);
      border-radius: 22px;
      background: rgba(0,0,0,.22);
      overflow: hidden;
    }

    .mini-art {
      height: 96px;
      background:
        radial-gradient(circle at 20% 30%, rgba(255,255,255,.25), transparent 18%),
        linear-gradient(135deg, rgba(214,178,94,.85), rgba(255,122,26,.72)),

      position: relative;
    }

      font-weight: 900;
      color: #101010;
      letter-spacing: .06em;

    .mini-info {
      padding: 13px 15px;

      justify-content: space-between;
      gap: 12px;
      color: var(--muted);

      position: absolute;
      left: 0;
      bottom: 76px;
      width: 250px;
      padding: 18px;
      border: 1px solid var(--card-border);
      border-radius: 26px;
      background: rgba(13,15,22,.78);
      backdrop-filter: blur(18px);
      box-shadow: var(--shadow);
      animation: float 5s ease-in-out infinite;
    }

    .floating-card strong {
      display: block;
      font-size: 28px;
      letter-spacing: -0.05em;
    }

    .floating-card span {
      color: var(--muted);
      font-size: 13px;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-16px); }
    }

    section {
      padding: 90px 0;
      position: relative;
    }

    .section-head {
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 24px;
      margin-bottom: 38px;
    }

    .section-kicker {
      color: var(--gold);
      font-weight: 850;
      text-transform: uppercase;
      letter-spacing: .14em;
      font-size: 12px;
      margin-bottom: 10px;
    }

    .section-title {
      font-size: clamp(32px, 5vw, 58px);
      line-height: 1;
      letter-spacing: -0.065em;
      max-width: 760px;
    }

    .section-desc {
      color: var(--muted);
      max-width: 430px;
    }

    .marquee {
      padding: 24px 0;
      border-top: 1px solid var(--card-border);
      border-bottom: 1px solid var(--card-border);
      overflow: hidden;
      white-space: nowrap;
      color: rgba(255,255,255,.18);
      font-size: clamp(36px, 7vw, 88px);
      font-weight: 950;
      letter-spacing: -0.08em;
    }

    .marquee-track {
      display: inline-block;
      animation: marquee 24s linear infinite;
    }

    @keyframes marquee {
      from { transform: translateX(0); }
      to { transform: translateX(-50%); }
    }

    .filters {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 26px;
    }

    .filter-btn {
      padding: 10px 14px;
      border-radius: 999px;
      border: 1px solid var(--card-border);
      background: rgba(255,255,255,.045);
      color: var(--muted);
      cursor: pointer;
      transition: .25s ease;
    }

    .filter-btn.active,
    .filter-btn:hover {
      background: var(--gold-soft);
      color: var(--text);
      border-color: rgba(214,178,94,.35);
    }

    .work-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 18px;
    }

    .work-card {
      border: 1px solid var(--card-border);
      border-radius: 28px;
      background: rgba(255,255,255,.045);
      overflow: hidden;
      cursor: pointer;
      transition: .3s ease;
    }

    .work-card:hover {
      transform: translateY(-8px);
      border-color: rgba(214,178,94,.45);
      box-shadow: 0 22px 60px rgba(0,0,0,.30);
    }

    .work-art {
      height: 260px;
      position: relative;
      overflow: hidden;
      background: #111;
    }

    .work-art.branding {
      background:
        radial-gradient(circle at 22% 20%, rgba(255,255,255,.36), transparent 16%),
        linear-gradient(135deg, #d6b25e, #ff7a1a);
    }

    .work-art.restaurant {
      background:
        radial-gradient(circle at 24% 26%, rgba(255,255,255,.32), transparent 14%),
        linear-gradient(135deg, #ff3d00, #ffb000);
    }

    .work-art.social {
      background:
        radial-gradient(circle at 78% 24%, rgba(255,255,255,.26), transparent 15%),
        linear-gradient(135deg, #6f4cff, #ff3d8b);
    }

    .work-art.profile {
      background:
        radial-gradient(circle at 72% 24%, rgba(255,255,255,.28), transparent 15%),
        linear-gradient(135deg, #101827, #3a4d72);
    }

    .work-art.print {
      background:
        radial-gradient(circle at 20% 30%, rgba(255,255,255,.26), transparent 14%),
        linear-gradient(135deg, #0f5132, #d6b25e);

    .work-art.packaging {
      background:
        radial-gradient(circle at 78% 30%, rgba(255,255,255,.26), transparent 15%),
        linear-gradient(135deg, #111, #d6b25e);
    }

    .mock-lines span {

    .mock-title {

    .work-info {

    .work-info small {

    }

    .work-info h3 {
      margin: 8px 0 6px;

      letter-spacing: -0.04em;
    }

    .work-info p {
      color: var(--muted);

    }

    .services-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 18px;
    }

    .service-card {
      padding: 26px;
      border: 1px solid var(--card-border);

      background: rgba(255,255,255,.045);
      transition: .25s ease;
    }

    .service-card:hover {
      transform: translateY(-6px);
